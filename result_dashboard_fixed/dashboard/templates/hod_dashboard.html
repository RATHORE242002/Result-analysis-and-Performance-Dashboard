<!DOCTYPE html>
<html>
<head>
    <title>HOD Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background: #f4f6f9; }</style>
</head>
<body>
<div class="container mt-5">
    <div class="card p-4 text-center" style="border-radius:15px; box-shadow:0 4px 10px rgba(0,0,0,0.08);">
        <h2>🎓 HOD Dashboard</h2>
        <p class="text-muted">Welcome, {{ request.user.username }}</p>
        <div class="d-flex gap-3 justify-content-center mt-3">
            <a href="{% url 'dashboard' %}" class="btn btn-primary">📊 View Dashboard</a>
            <a href="{% url 'student_result' %}" class="btn btn-info">🔍 Search Student</a>
            <a href="{% url 'logout' %}" class="btn btn-danger">🚪 Logout</a>
        </div>
    </div>
</div>
</body>
</html>
